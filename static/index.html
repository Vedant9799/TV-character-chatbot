<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TV Character Chatbot</title>
  <style>
    /* ── Reset & Base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0f1117;
      --surface:    #1a1d27;
      --surface2:   #22263a;
      --border:     #2e3150;
      --accent:     #6c63ff;
      --accent2:    #ff6584;
      --text:       #e8e8f0;
      --text-muted: #8a8aaa;
      --user-bg:    #6c63ff;
      --bot-bg:     #22263a;
      --radius:     14px;
      --font:       'Segoe UI', system-ui, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
    }

    /* ── Layout ───────────────────────────────────────────────── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 860px;
      margin: 0 auto;
    }

    /* ── Header ───────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      gap: 12px;
      flex-shrink: 0;
    }

    .header-left { display: flex; align-items: center; gap: 10px; }

    .logo { font-size: 22px; }

    h1 {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    h1 span { color: var(--accent); }

    /* ── Character selector ───────────────────────────────────── */
    .char-selector {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .char-selector label {
      font-size: 13px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    #charSelect {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 14px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }

    #charSelect:focus { border-color: var(--accent); }

    /* ── Status dot ───────────────────────────────────────────── */
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #555;
      transition: background 0.3s;
    }
    .dot.connected    { background: #4caf50; }
    .dot.connecting   { background: #ff9800; }
    .dot.disconnected { background: #f44336; }

    /* ── Active character banner ───────────────────────────────── */
    #charBanner {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    #bannerAvatar { font-size: 20px; }
    #bannerName { color: var(--text); font-weight: 600; }
    #bannerShow { font-size: 12px; }

    /* ── Chat area ────────────────────────────────────────────── */
    #chatArea {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    #chatArea::-webkit-scrollbar { width: 5px; }
    #chatArea::-webkit-scrollbar-track { background: transparent; }
    #chatArea::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Messages ─────────────────────────────────────────────── */
    .msg-row {
      display: flex;
      gap: 10px;
      max-width: 78%;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }

    .msg-row.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .msg-row.bot { align-self: flex-start; }

    .avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      background: var(--surface2);
      border: 1px solid var(--border);
      flex-shrink: 0;
      align-self: flex-end;
    }

    .bubble-wrap { display: flex; flex-direction: column; gap: 4px; }

    .sender-name {
      font-size: 11px;
      color: var(--text-muted);
      padding: 0 4px;
    }

    .msg-row.user .sender-name { text-align: right; }

    .bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      line-height: 1.55;
      font-size: 14px;
      word-break: break-word;
    }

    .msg-row.user  .bubble { background: var(--user-bg); color: #fff; border-bottom-right-radius: 4px; }
    .msg-row.bot   .bubble { background: var(--bot-bg);  color: var(--text); border-bottom-left-radius: 4px; }

    /* blinking cursor while streaming */
    .bubble.streaming::after {
      content: '▌';
      animation: blink 0.7s step-end infinite;
      color: var(--accent);
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── Welcome message ──────────────────────────────────────── */
    .welcome {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }
    .welcome .emoji { font-size: 48px; margin-bottom: 12px; }
    .welcome h2 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
    .welcome p  { font-size: 14px; line-height: 1.6; max-width: 380px; margin: 0 auto; }

    /* ── Input area ───────────────────────────────────────────── */
    .input-area {
      padding: 14px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #msgInput {
      flex: 1;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: var(--font);
      resize: none;
      outline: none;
      max-height: 130px;
      line-height: 1.5;
      transition: border-color 0.2s;
    }
    #msgInput:focus { border-color: var(--accent); }
    #msgInput::placeholder { color: var(--text-muted); }

    #sendBtn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      width: 44px; height: 44px;
      font-size: 20px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, opacity 0.2s;
      flex-shrink: 0;
    }
    #sendBtn:hover:not(:disabled)  { background: #5a52e0; }
    #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }

    #clearBtn {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 10px;
      width: 44px; height: 44px;
      font-size: 17px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }
    #clearBtn:hover { color: var(--text); border-color: var(--text-muted); }
  </style>
</head>
<body>

<div class="app">

  <!-- Header -->
  <header>
    <div class="header-left">
      <span class="logo">📺</span>
      <h1>TV Character <span>Chatbot</span></h1>
    </div>

    <div class="char-selector">
      <label for="charSelect">Character:</label>
      <select id="charSelect">
        <optgroup label="The Big Bang Theory">
          <option value="Sheldon">🧪 Sheldon</option>
          <option value="Leonard">🔭 Leonard</option>
          <option value="Penny">🥂 Penny</option>
          <option value="Howard">🚀 Howard</option>
          <option value="Raj">⭐ Raj</option>
          <option value="Bernadette">🦠 Bernadette</option>
          <option value="Amy">🧠 Amy</option>
        </optgroup>
        <optgroup label="The Office">
          <option value="Michael">👔 Michael</option>
          <option value="Dwight">🌱 Dwight</option>
          <option value="Jim">😏 Jim</option>
          <option value="Pam">🎨 Pam</option>
          <option value="Andy">🎵 Andy</option>
          <option value="Ryan">💼 Ryan</option>
          <option value="Kevin">🍪 Kevin</option>
          <option value="Angela">🐱 Angela</option>
        </optgroup>
      </select>
    </div>

    <div class="status">
      <div class="dot connecting" id="statusDot"></div>
      <span id="statusText">Connecting…</span>
    </div>
  </header>

  <!-- Active character banner -->
  <div id="charBanner">
    <span id="bannerAvatar">🧪</span>
    <div>
      <span id="bannerName">Sheldon</span>
      <span id="bannerShow"> · The Big Bang Theory</span>
    </div>
  </div>

  <!-- Chat messages -->
  <div id="chatArea">
    <div class="welcome" id="welcome">
      <div class="emoji">🎬</div>
      <h2>Start a conversation!</h2>
      <p>Pick a character above and say anything. The chatbot will respond in character using scenes from the show as context.</p>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <button id="clearBtn" title="Clear chat">🗑</button>
    <textarea id="msgInput" rows="1" placeholder="Say something…" disabled></textarea>
    <button id="sendBtn" title="Send" disabled>➤</button>
  </div>

</div>

<script>
  // ── Character metadata ─────────────────────────────────────────
  const META = {
    Sheldon:    { emoji: '🧪', show: 'The Big Bang Theory' },
    Leonard:    { emoji: '🔭', show: 'The Big Bang Theory' },
    Penny:      { emoji: '🥂', show: 'The Big Bang Theory' },
    Howard:     { emoji: '🚀', show: 'The Big Bang Theory' },
    Raj:        { emoji: '⭐', show: 'The Big Bang Theory' },
    Bernadette: { emoji: '🦠', show: 'The Big Bang Theory' },
    Amy:        { emoji: '🧠', show: 'The Big Bang Theory' },
    Michael:    { emoji: '👔', show: 'The Office' },
    Dwight:     { emoji: '🌱', show: 'The Office' },
    Jim:        { emoji: '😏', show: 'The Office' },
    Pam:        { emoji: '🎨', show: 'The Office' },
    Andy:       { emoji: '🎵', show: 'The Office' },
    Ryan:       { emoji: '💼', show: 'The Office' },
    Kevin:      { emoji: '🍪', show: 'The Office' },
    Angela:     { emoji: '🐱', show: 'The Office' },
  };

  // ── DOM refs ───────────────────────────────────────────────────
  const chatArea    = document.getElementById('chatArea');
  const msgInput    = document.getElementById('msgInput');
  const sendBtn     = document.getElementById('sendBtn');
  const clearBtn    = document.getElementById('clearBtn');
  const charSelect  = document.getElementById('charSelect');
  const statusDot   = document.getElementById('statusDot');
  const statusText  = document.getElementById('statusText');
  const bannerAvatar = document.getElementById('bannerAvatar');
  const bannerName  = document.getElementById('bannerName');
  const bannerShow  = document.getElementById('bannerShow');
  const welcome     = document.getElementById('welcome');

  // ── State ──────────────────────────────────────────────────────
  let ws = null;
  let currentChar = 'Sheldon';
  let isStreaming = false;
  let currentBotBubble = null;

  // ── WebSocket ──────────────────────────────────────────────────
  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws`);

    ws.onopen = () => {
      setStatus('connected', 'Connected');
      msgInput.disabled = false;
      sendBtn.disabled  = false;
      sendCharacter(currentChar);
    };

    ws.onclose = () => {
      setStatus('disconnected', 'Disconnected');
      msgInput.disabled = true;
      sendBtn.disabled  = true;
      setTimeout(connect, 3000);   // auto-reconnect
    };

    ws.onerror = () => {
      setStatus('disconnected', 'Error');
    };

    ws.onmessage = (evt) => {
      const data = JSON.parse(evt.data);

      if (data.type === 'character_set') {
        updateBanner(data.character);
        return;
      }

      if (data.type === 'token') {
        if (!currentBotBubble) {
          currentBotBubble = appendBotMessage('');
        }
        currentBotBubble.textContent += data.content;
        scrollToBottom();
        return;
      }

      if (data.type === 'done') {
        if (currentBotBubble) {
          currentBotBubble.classList.remove('streaming');
          currentBotBubble = null;
        }
        isStreaming = false;
        sendBtn.disabled = false;
        msgInput.disabled = false;
        msgInput.focus();
        return;
      }

      if (data.type === 'error') {
        appendSystemMsg(`⚠️ ${data.content}`);
        isStreaming = false;
        sendBtn.disabled = false;
        msgInput.disabled = false;
      }
    };
  }

  // ── Status ─────────────────────────────────────────────────────
  function setStatus(cls, text) {
    statusDot.className = `dot ${cls}`;
    statusText.textContent = text;
  }

  // ── Banner ─────────────────────────────────────────────────────
  function updateBanner(char) {
    const m = META[char] || { emoji: '🎬', show: '' };
    bannerAvatar.textContent = m.emoji;
    bannerName.textContent   = char;
    bannerShow.textContent   = ` · ${m.show}`;
  }

  // ── Send character selection ───────────────────────────────────
  function sendCharacter(char) {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'set_character', character: char }));
    }
  }

  // ── DOM helpers ────────────────────────────────────────────────
  function removeWelcome() {
    if (welcome && welcome.parentNode) welcome.remove();
  }

  function scrollToBottom() {
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function appendBotMessage(text) {
    removeWelcome();
    const m = META[currentChar] || { emoji: '🎬' };

    const row = document.createElement('div');
    row.className = 'msg-row bot';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = m.emoji;

    const wrap = document.createElement('div');
    wrap.className = 'bubble-wrap';

    const name = document.createElement('div');
    name.className = 'sender-name';
    name.textContent = currentChar;

    const bubble = document.createElement('div');
    bubble.className = 'bubble streaming';
    bubble.textContent = text;

    wrap.append(name, bubble);
    row.append(avatar, wrap);
    chatArea.append(row);
    scrollToBottom();
    return bubble;
  }

  function appendUserMessage(text) {
    removeWelcome();

    const row = document.createElement('div');
    row.className = 'msg-row user';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '🧑';

    const wrap = document.createElement('div');
    wrap.className = 'bubble-wrap';

    const name = document.createElement('div');
    name.className = 'sender-name';
    name.textContent = 'You';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    wrap.append(name, bubble);
    row.append(avatar, wrap);
    chatArea.append(row);
    scrollToBottom();
  }

  function appendSystemMsg(text) {
    const div = document.createElement('div');
    div.style.cssText = 'text-align:center;font-size:12px;color:var(--text-muted);padding:6px 0';
    div.textContent = text;
    chatArea.append(div);
    scrollToBottom();
  }

  // ── Send message ───────────────────────────────────────────────
  function sendMessage() {
    if (isStreaming) return;
    const text = msgInput.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

    appendUserMessage(text);
    msgInput.value = '';
    msgInput.style.height = 'auto';
    isStreaming = true;
    sendBtn.disabled  = true;
    msgInput.disabled = true;

    ws.send(JSON.stringify({ type: 'chat', message: text }));
  }

  // ── Character change ───────────────────────────────────────────
  charSelect.addEventListener('change', () => {
    currentChar = charSelect.value;
    sendCharacter(currentChar);
    // Clear chat and show fresh welcome-ish note
    chatArea.innerHTML = '';
    appendSystemMsg(`🎬 Now chatting with ${currentChar}`);
    currentBotBubble = null;
    isStreaming = false;
    sendBtn.disabled  = false;
    msgInput.disabled = false;
    msgInput.focus();
  });

  // ── Send on click / Enter ──────────────────────────────────────
  sendBtn.addEventListener('click', sendMessage);

  msgInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Auto-grow textarea
  msgInput.addEventListener('input', () => {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 130) + 'px';
  });

  // ── Clear chat ─────────────────────────────────────────────────
  clearBtn.addEventListener('click', () => {
    chatArea.innerHTML = '';
    appendSystemMsg(`🎬 Chat cleared — still talking to ${currentChar}`);
    currentBotBubble = null;
    isStreaming = false;
    sendBtn.disabled  = false;
    msgInput.disabled = false;
    // Tell server to reset history
    sendCharacter(currentChar);
  });

  // ── Boot ───────────────────────────────────────────────────────
  connect();
</script>
</body>
</html>
